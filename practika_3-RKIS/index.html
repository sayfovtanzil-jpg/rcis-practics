<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика поДисциплине Разработка кода информационных систем</title>
</head>
<body>
      <header>
        <nav></nav>
      </header>

      <selection class="banner">
        <div class="content"></div>
      </selection>

      <selection class="advantages">
        <div class="content">
            <div class="advantage"></div>
            <div class="advantage"></div>
            <div class="advantage"></div>
            <div class="advantage"></div>
        </div>
      </selection>

      <selection class="select">
        <div class="content">
            <div class="select_cakes">
                <div class="select_cake"></div>
                <div class="select_cake"></div>
            </div>
        </div>
      </selection>

      <selection class="about">
        <div class="about_wrap">
            <div class="about_text"></div>
        </div>
      </selection>

      <selection class="reviews">
        <div class="content">
            <div class="review">
                <div class="review_text"></div>
            </div>
        </div>
      </selection>

      <selection class="feedback" id="feedback">
        <div class="content">
            <div class="form_contact"></div>
            <div class="form_download"></div>
            <div class="form_submit"></div>
        </div>
      </selection>

      <selection class="map">
        <div class="content"></div>
      </selection>

      <footer>
        <div class="content">
            <footer_main>
                <div class="footer_info"></div>
                <footer_social></footer_social>
                <div class="footer_menu">
                    <nav></nav>
                </div>
            </footer_main>
            <div class="footer_add"></div>
        </div>
      </footer>

      <selection class="cakes">
        <div class="content">

            <div class="cake">
                <div class="cake_discript">
                    <div class="cake_discript_text"></div>
                </div>
                
                <div class="cake_buy">
                    <div class="cake_buy_wrap">
                        <div class="cake_buy_wrap_filling"></div>
                        <div class="cake_buy_wrap_price"></div>
                    </div>
                </div>
            </div>
        </div>
      </selection>

    </body>
</html>
