<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ступенчатые блоки Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .step-block {
      padding: 1.5rem;
      border-radius: 0.6rem;
      min-height: 120px;          /* примерно одинаковая высота — подтюнь под себя */
      display: flex;
      align-items: center;
    }

    .step-1 { background: #dc3545; color: white; } /* красный */
    .step-2 { background: #ffc107; color: black; } /* жёлтый */
    .step-3 { background: #0dcaf0; color: white; } /* голубой */

    @media (min-width: 768px) {
      .offset-neg-md { margin-top: -3rem !important; }   /* сдвиг вверх */
      .offset-pos-md { margin-top:  3rem !important; }   /* сдвиг вниз */
    }
  </style>
</head>
<body class="p-4 p-md-5 bg-light">
