<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой адаптивный сайт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Шапка -->
    <header class="bg-dark text-white p-4 text-center">
        <h1>Мой сайт</h1>
    </header>

    <!-- Основной контент -->
    <div class="container my-4">
        <div class="row g-4"> <!-- g-4 добавляет отступы между колонками -->
            <!-- Блок 1: на мобилке второй (order-2), на sm первый (order-sm-1) -->
            <div class="col-12 col-md-6 col-lg-4 order-2 order-sm-1">
                <div class="bg-light p-4 rounded shadow-sm">
                    <h3>Блок 1</h3>
                    <p>Описание блока 1. Здесь может быть текст.</p>
                </div>
            </div>


            <!-- Блок 2: на мобилке первый (order-1), на sm второй (order-sm-2) -->
            <div class="col-12 col-md-6 col-lg-4 order-1 order-sm-2">
                <div class="bg-primary text-white p-4 rounded shadow-sm">
                    <h3>Блок 2</h3>
                    <p>Этот блок самый важный на мобилках.</p>
                </div>
            </div>
            <!-- Блок 3: на мобилке третий (order-3), на sm третий (order-sm-3) -->
            <div class="col-12 col-md-12 col-lg-4 order-3 order-sm-3">
                <div class="bg-success text-white p-4 rounded shadow-sm">
                    <h3>Блок 3</h3>
                    <p>Дополнительная информация.</p>
                </div>
            </div>
        </div>
    </div>
