<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Диагональное расположение блоков с Bootstrap</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .block {
      background-color: #4CAF50;
      color: rgb(0, 0, 0);
      padding: 20px;
      text-align: center;
      border-width: 100
      0px;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <div class="row mb-3">
      <div class="col-12 col-sm-4 offset-sm-0">
        <div  style="background-color: rgb(250, 92, 92);" class="block">Крутой блок, верно?</div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-12 col-sm-4 offset-sm-4">
        <div  style="background-color: yellow;"class="block">Но посмотрите на этот</div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-12 col-sm-4 offset-sm-8">
        <div  style="background-color: rgb(97, 218, 177) ;" class="block">Хотя чего там, самый крутой</div>
      </div>
    </div>
  </div>

</body>
</html>
